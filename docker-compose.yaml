version: "3.8"

services:

  # émulateur AWS local 
  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=lambda,dynamodb,apigateway,iam,s3
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "./localstack_data:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
  pip-installer:
    image: python:3.9-slim
    container_name: pip-installer
    volumes:
      - ./src:/src:ro              
      - ./lambda_layers:/lambda_layers
      - ./lambda_package:/lambda_package   
    command: >
      pip install
        -r /src/requirements.txt
        -t /lambda_layers/python/
        --no-cache-dir
        --upgrade

  terraform:
    image: hashicorp/terraform:latest
    container_name: terraform
    working_dir: /workspace
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - TF_CLI_ARGS=-no-color
    volumes:
      - ./terraform:/workspace         
      - ./src:/src                      
      - ./lambda_layers:/lambda_layers
      - ./lambda_package:/lambda_package  # dépendances déjà installées par pip-installer
    depends_on:
      localstack:
        condition: service_healthy
    entrypoint: ["terraform"]
    command: ["version"]
  awscli:
    image: amazon/aws-cli:latest
    container_name: awscli
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://localstack:4566
    volumes:
      - ./:/project
    working_dir: /project
    depends_on:
      localstack:
        condition: service_healthy
    entrypoint: ["aws"]
